<!-- @format -->

<script type="module" src="@components/pages/home/home.js"></script>
<link rel="stylesheet" href="@components/pages/home/home.scss" />
<section class="page--home home">
  <div class="page__hero hero">
		<div class="hero__bg">
		    <picture class="hero__media" aria-hidden="true">

      <source srcset="@img/hero-image-desk.jpg" media="(min-width: 1550px)" />
      <source
        
        srcset="@img/hero-image-tablet.jpg"
        media="(min-width: 1150px)"
      />
      <source
      
        srcset="@img/hero-image-mobile.jpg"
        media="(min-width: 480px)"
      />
      <source
        
        srcset="@img/hero-image-small.jpg"
        media="(min-width: 375px)"
      />
      <img data-fls-image-ignore
      
        src="@img/hero-image-desk.jpg"
        alt=""
        class="hero__image"
      />
    </picture>
		<picture class="hero__shape" aria-hidden="true">
          <source srcset="@img/hero-shape-desk.png" media="(min-width: 1550px)" />
          <source srcset="@img/hero-shape-tablet.png" media="(min-width: 1150px)" />
          <source srcset="@img/hero-shape-mobile.png" media="(min-width: 480px)" />
          <source srcset="@img/hero-shape-small.png" media="(min-width: 375px)" />
          <img data-fls-image-ignore src="@img/hero-shape-desk.png" alt="" class="hero__shape-image" />
        </picture>
				</div>
		<div class="hero__container">
			<div class="hero__body">
 
   	<div class="hero__content-wrapper">
   	<div class="hero__content">
				 <a href="https://cuatrobet.com" class="hero__logo">
			<img class="hero__logo-image" src="@img/logo.png" alt="Logo">
		 </a>
      <h1 class="hero__title">Rueda de premios</h1>
    </div>
    </div>
		</div>
		<div class="hero__form-shape">
 
    <div class="hero__form form"
      aria-label="Registration form"
    >
      <div class="form__content">
        <div class="form__shell-top">
          <div class="form__shell-brand">
            <img src="@img/logo.svg" alt="" class="form__shell-brand-icon" />
            <span class="form__shell-brand-text">Aprovechá</span>
          </div>
          <button
            class="form__shell-action form__shell-action--next"
            type="button"
            aria-label="Soporte"
          >
            <span class="form__shell-support"></span>
          </button>
        </div>
        <div class="form__content-header">
          <h2 class="form__title">OBTENER BONIFICACIÓN</h2>
          <a href="https://cuatrobet.com/login" class="form__content-login">
            INICIAR SESIÓN
          </a>
          <div class="form__content-support">
            <div class="form__content-support-icon"></div>
          </div>
        </div>
  <button class="bonus-card" aria-label="Welcome bonus">
            <img
              src="@img/bono_3@1x.webp"
              srcset="@img/bono_3@1x.webp 1x, @img/bono_3@2x.webp 2x"
              alt="User"
              class="bonus-card__icon"
            />
            <div class="bonus-card__body">
              <p class="bonus-card__top">
                <span class="bonus-card__badge">Bono</span>
                <span class="bonus-card__label">
                  de Bienvenida para Casino en Vivo</span
                >
              </p>
              <p class="bonus-card__text">
                Bono de Casino en Vivo de hasta <br />
                el <strong>150%</strong> con tu primer depósito
              </p>
            </div>
 
          </button>
        <form class="register-form" id="register-form" novalidate>
          <input
            type="hidden"
            name="selectedBonus"
            id="selected-bonus-input"
            value=""
          />
          <input
            type="hidden"
            name="nnBonus"
            id="selected-bonus-code"
            value="3"
          />
          <input type="hidden" name="selectedLanguage" value="es" />
          <input type="hidden" name="defaultCurrency" value="ARS" />
          <label class="field field--phone">
            <span class="field__phone-prefix" aria-hidden="true">
              <img
                src="@img/svgicons/flag-argentina.svg"
                alt=""
                class="field__phone-flag"
              />

            </span>
            <input
              type="tel"
              name="phone"
              placeholder="Número de teléfono"
              required
              inputmode="numeric"
            />
            <span class="field__hidden-placeholder" aria-hidden="true"
              >Número de teléfono</span
            >
            <span class="field__error">
              <img
                src="@img/svgicons/error.svg"
                alt="error"
                class="field__error-icon"
              />
              Ingresa un número de teléfono válido
            </span>
          </label>
          <label class="field field--email">
            <img src="@img/svgicons/mail.svg" alt="email" class="field__icon" />
            <input
              type="email"
              name="email"
              placeholder="Correo electrónico"
              required
            />
            <span class="field__hidden-placeholder" aria-hidden="true"
              >Correo electrónico</span
            >
            <span class="field__error">
              <img
                src="@img/svgicons/error.svg"
                alt="error"
                class="field__error-icon"
              />
              Ingresa un correo electrónico válido
            </span>
          </label>
          <label class="field field--password">
            <img
              src="@img/svgicons/psw.svg"
              alt="password"
              class="field__icon"
            />
            <input
              type="password"
              name="password"
              placeholder="Contraseña"
              required
              minlength="8"
            />
            <span class="field__hidden-placeholder" aria-hidden="true"
              >Contraseña</span
            >
            <button
              class="field__toggle"
              type="button"
              aria-label="Show password"
            >
              <img src="@img/svgicons/eye.svg" alt="eye" class="field__eye" />
            </button>
            <span class="field__error">
              <img
                src="@img/svgicons/error.svg"
                alt="error"
                class="field__error-icon"
              />
              Debe tener 8 caracteres
            </span>
          </label>
          <label class="check">
            <input type="checkbox" name="isAdult" id="isAdult" required />
            <span class="check__box" aria-hidden="true">
              <img src="@img/svgicons/check.svg" alt="" class="check__icon" />
            </span>
            <span class="check__text">
              <span>Soy mayor de 18 años y acepto</span
              ><a href="https://cuatrobet.com/terms-and-conditions"
                ><strong
                  >el contrato de oferta para la moneda elegida</strong
                ></a
              >
              <span class="field__error">
                <img
                  src="@img/svgicons/error.svg"
                  alt="error"
                  class="field__error-icon"
                />
                Debes ser mayor de 18 años
              </span>
            </span>
          </label>
          <p
            class="register-form__error"
            id="register-form-error"
            role="alert"
            hidden
          ></p>
          <button class="register-form__submit" type="submit">
            <span class="register-form__submit-text">APROVECHÁ</span>
            <svg
              width="426"
              height="72"
              viewBox="0 0 426 72"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <g clip-path="url(#clip0_52_1797)">
                <path
                  d="M-386 -431L-282.874 -355.294L-275.874 -367.419L-172.75 -291.714L-165.75 -303.838L-62.6238 -228.133L-55.6238 -240.257L47.5022 -164.552L54.5022 -176.676L157.627 -100.971L164.627 -113.096L267.752 -37.39L274.752 -49.5144L377.878 26.1912L384.878 14.0669L488.003 89.7716L495.003 77.6472L598.129 153.353L605.129 141.228L708.255 216.934"
                  stroke="stroke"
                  stroke-width="2"
                />
                <path
                  d="M-111 688.255L-35.2944 585.129L-47.4188 578.129L28.2859 475.005L16.1616 468.005L91.8672 364.879L79.7428 357.879L155.448 254.753L143.324 247.753L219.029 144.628L206.904 137.628L282.61 34.5024L270.486 27.5024L346.191 -75.6236L334.067 -82.6236L409.772 -185.748L397.647 -192.748L473.353 -295.874L461.228 -302.874L536.934 -406"

                  stroke-width="2"
                />

                  d="M-494.332 -518.58L-406.61 -425.461L-397.532 -436.118L-309.811 -343L-300.733 -353.657L-213.011 -260.538L-203.932 -271.195L-116.211 -178.076L-107.132 -188.733L-19.4119 -95.6148L-10.3332 -106.272L77.3884 -13.1527L86.4671 -23.81L174.189 69.3094L183.267 58.6521L270.988 151.77L280.066 141.113L367.788 234.232L376.867 223.575L464.588 316.694"
                  stroke="stroke"
                  stroke-width="2"
                />

                  d="M-512 570.171L-412.183 490.153L-422.083 480.253L-322.267 400.237L-332.166 390.337L-232.349 310.319L-242.249 300.42L-142.432 220.402L-152.331 210.502L-52.5158 130.486L-62.4153 120.586L37.4017 40.5682L27.5022 30.6687L127.319 -49.3492L117.42 -59.2487L217.235 -139.265L207.336 -149.165L307.153 -229.183L297.253 -239.082L397.07 -319.1"
                  stroke="stroke"
                  stroke-width="2"
                />
              </g>
              <defs>
                <clipPath id="clip0_52_1797">
                  <rect width="426" height="72" rx="12" fill="white" />
                </clipPath>
              </defs>
            </svg>
          </button>
          <p class="register-form__signin">
            ¿Ya tenés una cuenta?
            <a href="https://cuatrobet.com/login">Iniciar sesión</a>
          </p>
        </form>
      </div>
    </div>
		</div>

  </div>

	</div>
</section>
